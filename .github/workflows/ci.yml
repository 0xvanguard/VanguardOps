name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-secret-key-must-be-at-least-thirty-two-characters-long
          DATABASE_URL: sqlite:///./test.db
          CELERY_TASK_ALWAYS_EAGER: "true"
          LOG_FORMAT: console
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: vanguardops-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test image
        run: |
          docker run --rm \
            -e ENVIRONMENT=test \
            -e SECRET_KEY=ci-secret-key-must-be-at-least-thirty-two-characters-long \
            -e DATABASE_URL=sqlite:///./smoke.db \
            -e CELERY_BROKER_URL=memory:// \
            -e CELERY_RESULT_BACKEND=cache+memory:// \
            vanguardops-api:ci \
            python -c "from app.main import create_app; app = create_app(); print(f'OK · {len(app.routes)} routes')"
